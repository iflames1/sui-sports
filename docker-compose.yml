services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: suisports
      POSTGRES_PASSWORD: suisports
      POSTGRES_DB: suisports
    # Host 5433 avoids clashing with Postgres already on 5432.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    # Host 6380 avoids clashing with a Redis already bound to 6379 on the machine.
    ports:
      - "6380:6379"

volumes:
  pgdata:
